; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:blackpill_f401ce]
platform = ststm32
board = blackpill_f401ce
framework = arduino
board_build.mcu = stm32f401ceu6
board_build.f_cpu = 84000000L
upload_protocol = stlink
debug_tool = stlink
;monitor_port = COM7
monitor_speed = 115200
build_flags =
  	-ffast-math
    -flto
    ;-D F_CPU=SystemCoreClock
    ;-O3
    ;-Wl,--gc-sections  ; It reduces the size by discarding unused code.
    ;-Wl,--print-gc-sections ; To see which functions have been deleted, use the terminal.
    ;-fdata-sections
    ;-Ofast
    ;-Wno-builtin-macro-redefined
